name: Daily NBA Predictions

on:
  schedule:
    - cron: '0 14 * * *'   # 10am ET every day (14:00 UTC)
  workflow_dispatch:         # allow manual trigger from GitHub UI

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch NBA data + train model (cached after first run)
        run: python3 -c "
import sys; sys.path.insert(0,'.')
from data.nba_fetcher import build_matchup_features
from models.trainer import train
import os
from pathlib import Path

# Only retrain if model doesn't exist
model_path = Path('models/nba_xgb_model.pkl')
if not model_path.exists():
    print('Training model...')
    df = build_matchup_features(list(range(2019, 2025)))
    df = df.dropna(subset=['home_win']).reset_index(drop=True)
    train_df = df[df['season'] < 2024].copy()
    from models.trainer import train
    train(train_df, sport='nba', model_type='xgb')
else:
    print('Model already exists, skipping training')
"
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Generate today's predictions
        run: python3 predict_today.py --output predictions.json
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Commit predictions.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add predictions.json data/raw/
          git diff --staged --quiet || git commit -m "predictions: $(date -u '+%Y-%m-%d')"
          git push
