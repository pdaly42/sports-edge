name: Daily NBA Predictions

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model if needed
        run: python3 scripts/train_if_needed.py
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Generate today's predictions
        run: python3 predict_today.py --output predictions.json
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Commit predictions.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add predictions.json data/raw/
          git diff --staged --quiet || git commit -m "predictions: $(date -u '+%Y-%m-%d')"
          git push
